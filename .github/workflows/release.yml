name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.0.1)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # GitHub-hosted runners — required for macOS and Windows cross-platform builds
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: WhisperClient-windows-x64.exe
          - os: macos-latest
            artifact_name: WhisperClient-macos-arm64
          - os: macos-13
            artifact_name: WhisperClient-macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Build executable
        run: |
          python scripts/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  # Self-hosted WAN runner — Linux build
  build-linux:
    runs-on: [self-hosted, Linux, X64, WAN]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev portaudio19-dev libgirepository1.0-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Build executable
        run: |
          python scripts/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperClient-linux-x64
          path: dist/WhisperClient-linux-x64
          if-no-files-found: error

  release:
    needs: [build, build-linux]
    runs-on: [self-hosted, Linux, X64, WAN]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
          ls -la release/

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: release/*
          body: |
            ## WhisperClient v${{ steps.version.outputs.version }}

            Cross-platform push-to-talk speech-to-text client for Whisper servers.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows (64-bit) | `WhisperClient-windows-x64.exe` |
            | macOS (Apple Silicon) | `WhisperClient-macos-arm64` |
            | macOS (Intel) | `WhisperClient-macos-x64` |
            | Linux (64-bit) | `WhisperClient-linux-x64` |

            ### Installation

            Download the appropriate file for your platform and run it directly. No Python installation required.

            **Linux users:** You may need to make the file executable:
            ```bash
            chmod +x WhisperClient-linux-x64
            ./WhisperClient-linux-x64
            ```

            **macOS users:** You may need to allow the app in System Preferences > Security & Privacy.

            See [CHANGELOG.md](https://github.com/RazvanApps/WhisperClient/blob/main/CHANGELOG.md) for details.
